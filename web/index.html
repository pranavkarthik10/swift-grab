<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>swift-grab — inspector</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header>
          <div class="title">
            <span class="dot"></span>
            <h1>swift-grab</h1>
            <button id="closeSidebar" class="icon-btn" title="Hide sidebar (⇧I)" aria-label="Hide sidebar">
              <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
                <path d="M10 3l-5 5 5 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="device" id="device">—</div>
        </header>

        <div class="controls">
          <div class="row">
            <button id="inspectBtn" class="primary" aria-pressed="false">
              <span class="key">I</span> Inspect
            </button>
            <button id="refreshBtn"><span class="key">R</span> Refresh tree</button>
          </div>
          <div class="row">
            <button id="homeBtn"><span class="key">H</span> Home</button>
          </div>
          <div class="row">
            <label class="select">
              <span class="select-label">Video</span>
              <select id="transportSel" aria-label="Video transport">
                <option value="auto">Auto</option>
                <option value="capturekit">Fast (CaptureKit)</option>
                <option value="screenshot">Accurate (simctl)</option>
              </select>
            </label>
          </div>
        </div>

        <section class="panel">
          <div class="panel-title">Selected</div>
          <div id="selected" class="selected empty">hover any element</div>
        </section>

        <section class="panel grow">
          <div class="panel-title">Component stack</div>
          <ol id="stack" class="stack"></ol>
        </section>

        <footer>
          <span id="status" class="status">connecting…</span>
          <span id="source" class="source">—</span>
        </footer>
      </aside>

      <main id="stage">
        <button id="openSidebar" class="floating-btn" title="Show sidebar (⇧I)" aria-label="Show sidebar">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path d="M2 4h12M2 8h12M2 12h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="screenFrame">
          <div id="screen">
            <!-- <img> is driven by the bridge's binary frame stream.
                 Frames come from ScreenCaptureKit (preferred, ~50fps
                 JPEGs) or simctl screenshots (fallback, ~5-8fps). The
                 overlay + selection box sit on top. -->
            <img id="frameImg" alt="" draggable="false" />
            <div id="axDomLayer" class="ax-dom-layer" aria-hidden="true"></div>
            <div id="overlay" class="overlay hidden">
              <div id="overlayBox" class="overlay-box"></div>
              <div id="overlayLabel" class="overlay-label"></div>
            </div>
            <div id="selectionBox" class="selection-box hidden"></div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
